[mypy]
# Mypy configuration for Programma Assicurativo backend.
#
# Strategy:
#   - STRICT mode on core modules that are 100% type-hinted (shared, auth,
#     database, all routes/*, refactored business modules).
#   - LENIENT defaults for legacy monolith (server.py) and tests.
#
# Run:   cd /app/backend && mypy --config-file mypy.ini
# Gate:  exit code != 0 => CI fails.

python_version = 3.11
warn_unused_configs = False
warn_return_any = False
warn_redundant_casts = True
warn_unused_ignores = False
disallow_any_generics = False
check_untyped_defs = False
no_implicit_reexport = False
show_error_codes = True
show_column_numbers = True
pretty = True
# Motor stubs are incomplete (find_one returns Coroutine[..., None] in stub but
# actually returns dict). Globally suppress this false-positive category.
# - func-returns-value: motor find_one false negatives
# - return-value: same issue, dict vs Optional[dict]
# - empty-body: factory decorators that "return" via side-effect
# - arg-type: Pydantic ctor on dynamic dicts
disable_error_code = func-returns-value, return-value, empty-body, arg-type
exclude = (?x)(
      ^tests/
    | ^test_
    | __pycache__
    | seed_demo\.py
  )

# Third-party libs without type stubs — suppress missing imports.
[mypy-motor.*]
ignore_missing_imports = True

[mypy-bcrypt]
ignore_missing_imports = True

[mypy-jwt]
ignore_missing_imports = True

[mypy-reportlab.*]
ignore_missing_imports = True

[mypy-pdfplumber]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-tzlocal]
ignore_missing_imports = True

[mypy-httpx]
ignore_missing_imports = True

[mypy-emergentintegrations.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

# ----- CORE MODULES: strict -----
[mypy-database]
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_return_any = True
strict_equality = True

[mypy-shared]
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_return_any = True
strict_equality = True

[mypy-auth]
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_return_any = True
strict_equality = True

[mypy-routes.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_return_any = True
strict_equality = True

# routes/anagrafiche.py — estratto da server.py (iter23). Endpoint senza return
# type per coerenza con FastAPI response_model dinamico. Type-hint completi
# saranno aggiunti quando si introdurranno Pydantic Response models (P1).
[mypy-routes.anagrafiche]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# Legacy monolith — bypass strict checks; only catch syntax / fatal errors.
[mypy-server]
ignore_errors = True

# Legacy modules — type-hinted but with leniency on Pydantic/Motor dynamic returns.
[mypy-inps_calculator]
# inps_calculator has dynamic PARAMS dict with mixed numeric values that
# mypy can't track precisely (object vs int vs float). Pre-existing issues
# unrelated to extraction work. Skipping until refactored.
ignore_errors = True

[mypy-ania_importer]
warn_return_any = False

[mypy-pdf_brogliaccio]
warn_return_any = False

[mypy-brogliaccio]
warn_return_any = False

[mypy-avvisi_scadenze]
warn_return_any = False

[mypy-geocoder]
warn_return_any = False

[mypy-pdf_avvisi]
warn_return_any = False
